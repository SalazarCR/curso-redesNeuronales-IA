<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuralWeb - Dashboard Académico</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
        }
        .sidebar {
            height: 100vh;
            background: #212529;
            color: white;
            position: fixed;
            width: 250px;
        }
        .main-content {
            margin-left: 250px;
            padding: 20px;
        }
        .nav-link {
            color: rgba(255,255,255,0.8);
            padding: 15px 20px;
            border-radius: 0;
        }
        .nav-link:hover, .nav-link.active {
            background: #343a40;
            color: white;
        }
        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        .navbar-brand {
            font-weight: 600;
            padding: 20px;
            display: block;
            text-align: center;
            border-bottom: 1px solid #343a40;
        }
        @media (max-width: 768px) {
            .sidebar { width: 100%; height: auto; position: relative; }
            .main-content { margin-left: 0; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <a class="navbar-brand text-white text-decoration-none" href="{% url 'dashboard' %}">
            <i class="fas fa-brain me-2"></i> NeuralWeb
        </a>
        <nav class="nav flex-column mt-3">
            <a class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}" href="{% url 'dashboard' %}">
                <i class="fas fa-chart-line me-2"></i> Dashboard
            </a>
            <a class="nav-link {% if request.resolver_match.url_name == 'train' %}active{% endif %}" href="{% url 'train' %}">
                <i class="fas fa-upload me-2"></i> Entrenar Modelo
            </a>
            <a class="nav-link {% if request.resolver_match.url_name == 'explanation' %}active{% endif %}" href="{% url 'explanation' %}">
                <i class="fas fa-book me-2"></i> Explicación Teórica
            </a>
        </nav>
    </div>

    <div class="main-content">
        <header class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold text-dark">{% block title %}Panel de Control{% endblock %}</h2>
            <span class="badge bg-primary px-3 py-2">Estado: Online</span>
        </header>

        {% block content %}{% endblock %}

        <footer class="mt-5 text-center text-muted">
            <p>&copy; 2026 Universidad - Sistemas Inteligentes - Redes Neuronales</p>
        </footer>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>
</html>
